<!DOCTYPE html>
<html>
<head>
  <title>Smart Door Control</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #0f172a;
      color: #fff;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-size: 28px;
      color: #38bdf8;
    }

    .container {
      margin-top: 30px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 350px;
      margin: auto;
      box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
    }

    img {
      width: 100%;
      border-radius: 10px;
      border: 2px solid #38bdf8;
    }

    .status {
      margin: 10px 0;
      font-size: 14px;
      color: #94a3b8;
    }

    .buttons {
      margin-top: 15px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: 0.3s;
    }

    .allow {
      background: #22c55e;
      color: white;
    }

    .allow:hover {
      background: #16a34a;
      transform: scale(1.05);
    }

    .deny {
      background: #ef4444;
      color: white;
    }

    .deny:hover {
      background: #dc2626;
      transform: scale(1.05);
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: #64748b;
    }
  </style>
</head>

<body>

<h1>🚪 Smart Door Access Panel</h1>

<div class="container">
  <div class="card">

    <img id="visitor" src="" alt="No Image Yet">

    <div class="status" id="statusText">
      Waiting for visitor...
    </div>

    <div class="buttons">
      <button class="allow" onclick="allow()">ALLOW</button>
      <button class="deny" onclick="deny()">DENY</button>
    </div>

  </div>
</div>

<div class="footer">
  ESP32 IoT Security System • Live Monitoring
</div>

<script>
const firebaseURL = "https://smart-door-lock-715ba-default-rtdb.firebaseio.com/door.json";

function loadData() {
  fetch(firebaseURL)
    .then(res => res.json())
    .then(data => {
      if (data.image_url) {
        document.getElementById("visitor").src = data.image_url + "?t=" + new Date().getTime();
      }

      document.getElementById("statusText").innerText = 
        "Status: " + data.status + " | Decision: " + data.decision;
    });
}

function allow() {
  fetch(firebaseURL, {
    method: "PATCH",
    body: JSON.stringify({ decision: "ALLOW" })
  });
}

function deny() {
  fetch(firebaseURL, {
    method: "PATCH",
    body: JSON.stringify({ decision: "DENY" })
  });
}

setInterval(loadData, 2000);
</script>

</body>
</html>
